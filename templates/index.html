<!DOCTYPE html>
<html>
<head>
    <title>Stock Anomaly Dashboard</title>
    <script src="https://plot.ly"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        .stats-container { display: flex; gap: 20px; margin-bottom: 20px; font-family: sans-serif; }
        .stat-box { padding: 15px; border-radius: 8px; border: 1px solid #ddd; flex: 1; text-align: center; }
        .total { border-left: 5px solid black; color: black; font-weight: bold; border-right: 5px solid black;}
        .anomaly { border-left: 5px solid red; color: red; font-weight: bold; border-right: 5px solid red;}
        .normal { border-left: 5px solid green; color: green; font-weight: bold; border-right: 5px solid green;}
        .selectButton { margin-left: 10px; }
    </style>
</head>
<body>
    <h1>Stock Anomaly Detection</h1>
    <form method="POST">
        <input type="text" name="ticker" value="{{ ticker }}">
        <button type="submit">Analyze</button>
    </form>
    <div id="chart-container"></div>
    <div class="stats-container">
        <div class="stat-box total">
            <h3 id="total_count">Total Days</h3>
            <p id="total-count">{{ total_count }}</p>
        </div>
        <div class="stat-box normal">
            <h3 id="normal_count">Normal Data</h3>
            <p id="normal-count">{{ normal_count }}</p>
        </div>
        <div class="stat-box anomaly">
            <h3 id="anomaly_count">Anomalies Detected</h3>
            <p id="anomaly-count">{{ anomaly_count }}</p>
        </div>
    </div>

    <script type="text/javascript">
        // Use the '| safe' filter so Jinja doesn't mess up the JSON quotes
        var graphs = JSON.parse('{{ graphJSON | safe }}');
        // console.log(graphs);
        // Render the plot
        Plotly.newPlot('chart-container', graphs.data, graphs.layout || {});
    </script>
</body>
</html>
