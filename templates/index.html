<!DOCTYPE html>
<html>
<head>
    <title>Stock Anomaly Dashboard</title>
    <script src="https://plot.ly"></script>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { padding: 20px; }
        .stats-container { display: flex; gap: 20px; margin-bottom: 20px; font-family: sans-serif; }
        .stat-box { padding: 15px; border-radius: 8px; border: 1px solid #ddd; flex: 1; text-align: center; }
        .total { border-left: 5px solid black; color: black; font-weight: bold; border-right: 5px solid black;}
        .anomaly { border-left: 5px solid red; color: red; font-weight: bold; border-right: 5px solid red;}
        .normal { border-left: 5px solid green; color: green; font-weight: bold; border-right: 5px solid green;}
        .selectButton { margin-left: 10px; }
    </style>
</head>
<body>
    <h1>Stock Anomaly Detection</h1>
    <form method="POST" id="anomaly">
        <label for="ticker">Ticker:</label>
        <input type="text" name="ticker" value="{{ ticker }}">
        <label for="period" class="selectButton">Select Period:</label>
        <select name="period" id="period" class="selectButton">
            <option value="1d" {% if period == '1d' %}selected{% endif %}>1 Day</option>
            <option value="5d" {% if period == '5d' %}selected{% endif %}>5 Days</option>
            <option value="1mo" {% if period == '1mo' %}selected{% endif %}>1 Month</option>
            <option value="3mo" {% if period == '3mo' %}selected{% endif %}>3 Months</option>
            <option value="6mo" {% if period == '6mo' %}selected{% endif %}>6 Months</option>
            <option value="1y" {% if period == '1y' %}selected{% endif %}>1 Year</option>
            <option value="3y" {% if period == '3y' %}selected{% endif %}>3 Years</option>
            <option value="5y" {% if period == '5y' %}selected{% endif %}>5 Years</option>
            <option value="10y" {% if period == '10y' %}selected{% endif %}>10 Years</option>
        </select>
        <label for="interval" class="selectButton">Select Interval:</label>
        <select name="interval" id="interval" class="selectButton">
            <option value="1m" {% if interval == '1m' %}selected{% endif %}>1 Minute</option>
            <option value="2m" {% if interval == '2m' %}selected{% endif %}>2 Minutes</option>
            <option value="5m" {% if interval == '5m' %}selected{% endif %}>5 Minutes</option>
            <option value="15m" {% if interval == '15m' %}selected{% endif %}>15 Minutes</option>
            <option value="30m" {% if interval == '30m' %}selected{% endif %}>30 Minutes</option>
            <option value="60m" {% if interval == '60m' %}selected{% endif %}>60 Minutes</option>
            <option value="90m" {% if interval == '90m' %}selected{% endif %}>90 Minutes</option>
            <option value="1h" {% if interval == '1h' %}selected{% endif %}>1 Hour</option>
            <option value="1d" {% if interval == '1d' %}selected{% endif %}>1 Day</option>
            <option value="1wk" {% if interval == '1wk' %}selected{% endif %}>1 Week</option>
            <option value="1mo" {% if interval == '1mo' %}selected{% endif %}>1 Month</option>
            <option value="3mo" {% if interval == '3mo' %}selected{% endif %}>3 Months</option>
        </select>
        <input type="submit" value="Analyze" class="selectButton">
    </form>
    <div id="chart-container"></div>
    <div class="stats-container">
        <div class="stat-box total">
            <h3 id="total_count">Total Days</h3>
            <p id="total-count">{{ total_count }}</p>
        </div>
        <div class="stat-box normal">
            <h3 id="normal_count">Normal Data</h3>
            <p id="normal-count">{{ normal_count }}</p>
        </div>
        <div class="stat-box anomaly">
            <h3 id="anomaly_count">Anomalies Detected</h3>
            <p id="anomaly-count">{{ anomaly_count }}</p>
        </div>
    </div>

    <script type="text/javascript">
        // Use the '| safe' filter so Jinja doesn't mess up the JSON quotes
        var graphs = JSON.parse('{{ graphJSON | safe }}');
        // console.log(graphs);
        // Render the plot
        Plotly.newPlot('chart-container', graphs.data, graphs.layout || {});
    </script>
    <script>
        document.getElementById('period').addEventListener('change', function() {
            const period = this.value;
            const intervalSelect = document.getElementById('interval');
            const options = intervalSelect.options;

            // Define valid intervals for each period based on your rules
            const rules = {
                '1d':  ['1m', '2m', '5m', '15m', '30m', '60m', '90m', '1h', '1d'],
                '5d':  ['1m', '2m', '5m', '15m', '30m', '60m', '90m', '1h', '1d'],
                '1mo': ['2m', '5m', '15m', '30m', '60m', '90m', '1h', '1d', '1wk', '1mo'],
                '3mo': ['60m', '1h', '1d', '1wk', '1mo', '3mo'],
                '6mo': ['60m', '1h', '1d', '1wk', '1mo', '3mo'],
                '1y':  ['60m', '1h', '1d', '1wk', '1mo', '3mo'],
                '3y':  ['1d', '1wk', '1mo', '3mo'],
                '5y':  ['1d', '1wk', '1mo', '3mo'],
                '10y': ['1d', '1wk', '1mo', '3mo']
            };

            const validIntervals = rules[period] || [];
            let firstValidSet = false;

            for (let i = 0; i < options.length; i++) {
                const opt = options[i];
                if (validIntervals.includes(opt.value)) {
                    opt.disabled = false;
                    opt.style.display = 'block';
                    // Auto-select the first valid option if current selection becomes invalid
                    if (!firstValidSet) {
                        if (!validIntervals.includes(intervalSelect.value)) {
                            intervalSelect.value = opt.value;
                        }
                        firstValidSet = true;
                    }
                } else {
                    opt.disabled = true;
                    opt.style.display = 'none';
                }
            }
        });

        // Trigger once on page load to set initial state
        document.getElementById('period').dispatchEvent(new Event('change'));
    </script>
</body>
</html>
